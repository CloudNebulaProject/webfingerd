name: webfingerd

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

networks:
  solstice-ci_core:
    external: true

volumes:
  webfingerd-data:

services:
  webfingerd:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: webfingerd
    restart: unless-stopped
    environment:
      RUST_LOG: "info"
      WEBFINGERD__SERVER__LISTEN: "0.0.0.0:8080"
      WEBFINGERD__SERVER__BASE_URL: "https://webfinger.aopc.cloud"
      WEBFINGERD__DATABASE__PATH: "/app/data/webfingerd.db"
      WEBFINGERD__DATABASE__WAL_MODE: "true"
      WEBFINGERD__CACHE__REAPER_INTERVAL_SECS: "30"
      WEBFINGERD__RATE_LIMIT__PUBLIC_RPM: "60"
      WEBFINGERD__RATE_LIMIT__API_RPM: "300"
      WEBFINGERD__RATE_LIMIT__BATCH_RPM: "10"
      WEBFINGERD__RATE_LIMIT__BATCH_MAX_LINKS: "500"
      WEBFINGERD__CHALLENGE__DNS_TXT_PREFIX: "_webfinger-challenge"
      WEBFINGERD__CHALLENGE__HTTP_WELL_KNOWN_PATH: ".well-known/webfinger-verify"
      WEBFINGERD__CHALLENGE__CHALLENGE_TTL_SECS: "3600"
      WEBFINGERD__UI__ENABLED: "true"
      WEBFINGERD__UI__SESSION_SECRET: "${WEBFINGERD_SESSION_SECRET}"
    volumes:
      - webfingerd-data:/app/data
    networks:
      - solstice-ci_core
    labels:
      # Management UI + API on webfinger.aopc.cloud
      - traefik.enable=true
      - traefik.http.routers.webfingerd-mgmt.rule=Host(`webfinger.aopc.cloud`)
      - traefik.http.routers.webfingerd-mgmt.entrypoints=websecure
      - traefik.http.routers.webfingerd-mgmt.tls.certresolver=le
      - traefik.http.services.webfingerd.loadbalancer.server.port=8080

      # Public WebFinger on aopc.cloud (only well-known paths)
      - traefik.http.routers.webfingerd-public.rule=Host(`aopc.cloud`) && (PathPrefix(`/.well-known/webfinger`) || PathPrefix(`/.well-known/host-meta`))
      - traefik.http.routers.webfingerd-public.entrypoints=websecure
      - traefik.http.routers.webfingerd-public.tls.certresolver=le
      - traefik.http.routers.webfingerd-public.service=webfingerd
    logging: *default-logging
